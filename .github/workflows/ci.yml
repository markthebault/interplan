name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Test
        run: go test ./...

  snapshot-build:
    name: Snapshot build
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build snapshot binaries
        run: ./scripts/build-release.sh snapshot-${GITHUB_SHA::7}

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: interplan-snapshot-${{ github.sha }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14
